services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pipely}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pipely123}
      POSTGRES_DB: ${DB_NAME:-pipely_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pipely}"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution:
    image: ghcr.io/evolutionapi/evolution-go:latest
    restart: unless-stopped
    environment:
      - GLOBAL_API_KEY=${EVOLUTION_API_KEY:-}
      - CLIENT_NAME=pipely
      - SERVER_PORT=8080
      - DATABASE_SAVE_MESSAGES=true
      - POSTGRES_AUTH_DB=postgresql://${DB_USER:-pipely}:${DB_PASSWORD:-pipely123}@db:5432/${DB_NAME:-pipely_ai}?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://${DB_USER:-pipely}:${DB_PASSWORD:-pipely123}@db:5432/${DB_NAME:-pipely_ai}?sslmode=disable
      - LOGTYPE=text
      - WA_DEBUG=false
    depends_on:
      db:
        condition: service_healthy

  app:
    image: ghcr.io/pedro-furtado/pipely-ai:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-pipely}:${DB_PASSWORD:-pipely123}@db:5432/${DB_NAME:-pipely_ai}
      - JWT_SECRET=${JWT_SECRET:-}
      - FRONTEND_URL=${APP_URL:-http://localhost}
      - BACKEND_URL=http://127.0.0.1:3333
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-60000}
      - EVOLUTION_SERVER_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      evolution:
        condition: service_started

volumes:
  pgdata:
